<!DOCTYPE html>
<html><head><meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 820px; height: 1060px; background:
      radial-gradient(700px 360px at 50% -4%, #16306e, transparent 60%), #0A1124;
    font-family: "Inter", system-ui, sans-serif; color: #EEF2FB; display: flex; flex-direction: column; align-items: center; padding: 70px 56px; }
  .cobrand { display:flex; align-items:center; gap:14px; }
  .cobrand .q { font-family:"Sora"; font-weight:800; font-size:38px; letter-spacing:.04em; color:#fff; }
  .cobrand .tag { font-family:"JetBrains Mono"; font-size:14px; letter-spacing:.26em; text-transform:uppercase; color:#4D8DFF; border:1px solid #33406a; border-radius:999px; padding:7px 16px; background:rgba(77,141,255,.08); }
  .sub { color:#8C97B8; font-size:22px; margin-top:18px; font-family:"JetBrains Mono"; letter-spacing:.12em; text-transform:uppercase; }
  .headline { margin-top:46px; font-family:"Sora"; font-size:60px; font-weight:800; text-align:center; line-height:1.05; color:#fff; }
  .headline span { background:linear-gradient(135deg,#4D8DFF,#5FE3E0); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .qrwrap { margin-top:46px; padding:26px; background:#fff; border-radius:26px; box-shadow:0 0 0 2px rgba(77,141,255,.5), 0 24px 60px rgba(0,0,0,.5); }
  #qr { width:460px; height:460px; }
  #qr img, #qr canvas { width:460px !important; height:460px !important; display:block; }
  .steps { margin-top:42px; font-size:25px; color:#C9D6EE; text-align:center; line-height:1.7; }
  .steps b { font-family:"Sora"; color:#5FE3E0; }
  .foot { margin-top:auto; text-align:center; }
  .foot .help { font-size:18px; color:#8C97B8; }
  .url { font-family:"JetBrains Mono"; font-size:18px; color:#4D8DFF; margin-top:8px; }
  .edge { width:100%; height:3px; margin-top:30px; background:linear-gradient(90deg,transparent,#4D8DFF,#5FE3E0,#4D8DFF,transparent); }
</style></head>
<body>
  <div class="cobrand"><span class="q">QNB</span></div>
  <div class="sub">Toy Story 5 · Arrive 4:00 PM · Movie 4:30 PM</div>
  <div class="headline">Scan to get<br/><span>your ticket</span></div>
  <div class="qrwrap"><div id="qr"></div></div>
  <div class="steps"><b>1.</b> Scan this code &nbsp;·&nbsp; <b>2.</b> Enter your mobile &nbsp;·&nbsp; <b>3.</b> Show your QR at the door</div>
  <div class="edge"></div>
  <div class="foot">
    <div class="help">Trouble? See a QNB Movie Night staff member at the entrance.</div>
    <div class="url">qnbmovienight.netlify.app</div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    new QRCode(document.getElementById("qr"), {
      text: "https://qnbmovienight.netlify.app/",
      width: 460, height: 460, colorDark: "#0A1124", colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body></html>
